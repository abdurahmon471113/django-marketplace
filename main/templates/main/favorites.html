{% extends 'base.html' %}
{% load humanize %}

{% block title %}Избранное{% endblock %}

{% block content %}

<div class="container-fluid px-lg-5" style="margin-top: 170px; margin-bottom: 20px;">

    <div class="text-center mb-5">
        <h2 class="fw-semibold">Избранные объявления</h2>
    </div>

    <div class="row g-2">

        {% for ad in ads %}

        <div class="col-12 col-sm-6 col-md-4 col-lg-3">

            <a href="{% url 'main:ad_detail' ad.pk %}" class="cursor-link-ad_detail">

                <div class="card h-100 border-0 rounded-0 shadow" style="min-height:380px; min-width:289px;">

                    <div class="image-top-list" style="height:220px;">

                        {% if ad.images %}
    <img
        src="{{ ad.images.url }}"
        alt="{{ ad.title }}"
        style="width:100%; height:100%; object-fit:cover;"
    >
{% endif %}

                    </div>

                    <div class="card-body d-flex flex-column">

                        <h5 class="fw-semibold fs-6 mb-3">
                            {{ ad.title }}
                        </h5>

                        <p class="text-muted small mb-4">
                            Номер: {{ ad.phone }}
                        </p>

                        <div class="mt-auto d-flex justify-content-between align-items-center">

                            <h5 class="fw-bold mb-0">
                                {{ ad.price|intcomma }} сум
                            </h5>


                                <form method="POST" action="{% url 'main:delete_favorite_ad' ad.pk %}">
                                    {% csrf_token %}
                                   <input type="hidden" name="redirect_to" value="saved_ads">
                                    <input class="favorite-btn" type="submit" value="♥">
                                </form>




                        </div>




                    </div>

                </div>

            </a>

        </div>

        {% endfor %}

    </div>

</div>

{% endblock %}
